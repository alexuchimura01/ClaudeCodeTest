<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; color: #eee; }
  .container { text-align: center; }
  h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
  #status { font-size: 1.3rem; margin-bottom: 1rem; min-height: 2rem; }
  .board { display: grid; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 120px); gap: 6px; margin: 0 auto 1.5rem; }
  .cell { background: #16213e; border: none; border-radius: 8px; font-size: 3rem; font-weight: bold; color: #eee; cursor: pointer; transition: background 0.15s; }
  .cell:hover { background: #1a1a40; }
  .cell.x { color: #e94560; }
  .cell.o { color: #0f3460; }
  .cell.win { background: #e9456033; }
  #restart { padding: 0.7rem 2rem; font-size: 1.1rem; border: none; border-radius: 6px; background: #e94560; color: #fff; cursor: pointer; }
  #restart:hover { background: #c73650; }
</style>
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div class="board" id="board"></div>
  <button id="restart">Restart</button>
</div>
<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
const restartBtn = document.getElementById('restart');
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let cells, turn, gameOver;

function init() {
  board.innerHTML = '';
  cells = Array(9).fill('');
  turn = 'X';
  gameOver = false;
  status.textContent = "X's turn";
  for (let i = 0; i < 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.dataset.i = i;
    btn.addEventListener('click', handleClick);
    board.appendChild(btn);
  }
}

function handleClick(e) {
  const i = e.target.dataset.i;
  if (gameOver || cells[i]) return;
  cells[i] = turn;
  e.target.textContent = turn;
  e.target.classList.add(turn.toLowerCase());
  const winCombo = checkWin(turn);
  if (winCombo) {
    gameOver = true;
    status.textContent = `${turn} wins!`;
    winCombo.forEach(idx => board.children[idx].classList.add('win'));
  } else if (cells.every(c => c)) {
    gameOver = true;
    status.textContent = "It's a draw!";
  } else {
    turn = turn === 'X' ? 'O' : 'X';
    status.textContent = `${turn}'s turn`;
  }
}

function checkWin(p) {
  return wins.find(combo => combo.every(i => cells[i] === p)) || null;
}

restartBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
